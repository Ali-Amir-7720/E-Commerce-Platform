openapi: 3.0.0

info:
  title: E-Commerce Platform API
  version: 1.0.0
  description: |
    REST API for an E-Commerce platform built with Node.js, Express, and PostgreSQL.

    **Role IDs in JWT:**
    | role_id | Role     | Access                                    |
    |---------|----------|-------------------------------------------|
    | 1       | Admin    | Full system access                        |
    | 2       | Customer | Browse, cart, orders, wishlist            |
    | 3       | Vendor   | Manage own products                       |
    | 4       | Courier  | View and update assigned deliveries       |

    **Transaction endpoints:**
    - `POST /orders` — BEGIN/COMMIT/ROLLBACK, stock deduction via DB trigger
    - `POST /admin/assign-courier` — BEGIN/COMMIT/ROLLBACK, row-level locks

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server

# ─── Global security — override with `security: []` on public routes ──────────
security:
  - bearerAuth: []

# ─── Reusable components ───────────────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT obtained from POST /auth/login. Include as: Authorization Bearer token."

  schemas:

    # ── Shared primitives ──────────────────────────────────────────────────────
    Error:
      type: object
      properties:
        error:
          type: string
          example: "Resource not found"
        detail:
          type: string
          example: "Additional context about the failure"

    # ── Auth ───────────────────────────────────────────────────────────────────
    UserPublic:
      type: object
      properties:
        id:           { type: integer, example: 1 }
        full_name:    { type: string,  example: "John Doe" }
        email:        { type: string,  format: email, example: "john@example.com" }
        role_id:      { type: integer, example: 2 }
        role_name:    { type: string,  example: "Customer" }
        status:       { type: string,  enum: [active, inactive, blocked], example: "active" }
        created_at:   { type: string,  format: date-time }

    AuthResponse:
      type: object
      properties:
        message: { type: string, example: "Login successful" }
        token:   { type: string, example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." }
        user:    { $ref: '#/components/schemas/UserPublic' }

    # ── Category ───────────────────────────────────────────────────────────────
    Category:
      type: object
      properties:
        id:            { type: integer, example: 1 }
        category_name: { type: string,  example: "Electronics" }
        parent_cat_id: { type: integer, nullable: true, example: null }
        parent_name:   { type: string,  nullable: true, example: null }
        status:        { type: string,  enum: [active, inactive], example: "active" }
        created_at:    { type: string,  format: date-time }

    # ── Product ────────────────────────────────────────────────────────────────
    ProductVariant:
      type: object
      properties:
        id:             { type: integer, example: 1 }
        variant_name:   { type: string,  example: "128GB Black" }
        sku:            { type: string,  example: "SM-X-128-BLK" }
        price:          { type: number,  example: 799.99 }
        stock_quantity: { type: integer, example: 50 }
        created_at:     { type: string,  format: date-time }

    Product:
      type: object
      properties:
        id:            { type: integer, example: 1 }
        product_name:  { type: string,  example: "Smartphone X" }
        description:   { type: string,  example: "Latest state-of-the-art smartphone." }
        category_name: { type: string,  example: "Electronics" }
        status:        { type: string,  enum: [active, inactive], example: "active" }
        variant_count: { type: integer, example: 3 }
        created_at:    { type: string,  format: date-time }

    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/Product'
        - type: object
          properties:
            variants:
              type: array
              items: { $ref: '#/components/schemas/ProductVariant' }

    # ── Cart ───────────────────────────────────────────────────────────────────
    CartItem:
      type: object
      properties:
        cart_item_id:        { type: integer, example: 1 }
        product_variant_id:  { type: integer, example: 3 }
        product_name:        { type: string,  example: "Smartphone X" }
        variant_name:        { type: string,  example: "128GB Black" }
        price:               { type: number,  example: 799.99 }
        stock_quantity:      { type: integer, example: 50 }
        quantity:            { type: integer, example: 2 }
        line_total:          { type: number,  example: 1599.98 }

    CartResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/CartItem' }
        total:
          type: string
          example: "1599.98"

    # ── Order ──────────────────────────────────────────────────────────────────
    OrderItem:
      type: object
      properties:
        variant_name:  { type: string,  example: "128GB Black" }
        price:         { type: number,  example: 799.99 }
        quantity:      { type: integer, example: 2 }
        total_amount:  { type: number,  example: 1599.98 }

    OrderSummary:
      type: object
      properties:
        id:              { type: integer, example: 1 }
        order_number:    { type: string,  example: "ORD-1716000000000-427" }
        total_amount:    { type: string,  example: "1599.98" }
        discount_amount: { type: string,  example: "160.00" }
        shipping_amount: { type: string,  example: "5.99" }
        net_amount:      { type: string,  example: "1445.97" }
        status:          { type: string,  enum: [placed, processing, shipping, delivered] }
        payment_status:  { type: string,  enum: [paid, "not paid"] }
        payment_type:    { type: string,  enum: [netbanking, upi, cod] }
        created_at:      { type: string,  format: date-time }

    OrderDetail:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            full_address: { type: string,  example: "123 Main St" }
            city:         { type: string,  example: "Lahore" }
            state:        { type: string,  example: "Punjab" }
            zip_code:     { type: integer, example: 54000 }
            items:
              type: array
              items: { $ref: '#/components/schemas/OrderItem' }

    # ── Offer ──────────────────────────────────────────────────────────────────
    Offer:
      type: object
      properties:
        id:              { type: integer, example: 1 }
        coupon_code:     { type: string,  example: "SUMMER10" }
        discount_type:   { type: string,  enum: [fixed, rate] }
        discount_value:  { type: number,  example: 10.00 }
        start_date:      { type: string,  format: date, example: "2026-06-01" }
        end_date:        { type: string,  format: date, example: "2026-08-31" }
        status:          { type: string,  enum: [active, inactive] }

    # ── Delivery ───────────────────────────────────────────────────────────────
    DeliveryRecord:
      type: object
      properties:
        delivery_id:  { type: integer, example: 1 }
        order_id:     { type: integer, example: 5 }
        courier_id:   { type: integer, example: 2 }
        assigned_at:  { type: string, format: date-time }

# ─── Tags ──────────────────────────────────────────────────────────────────────
tags:
  - name: Auth
    description: Registration, login, and session endpoints
  - name: Admin
    description: Admin-only user management and courier assignment
  - name: Categories
    description: Product category management
  - name: Products
    description: Product and variant management
  - name: Cart
    description: Shopping cart (Customer only)
  - name: Wishlist
    description: Wishlist management (Customer only)
  - name: Orders
    description: Order placement and tracking
  - name: Offers
    description: Coupon and discount management
  - name: Courier
    description: Delivery management (Courier only)
  - name: Reports
    description: Admin report views (Admin only)

# ─── Paths ─────────────────────────────────────────────────────────────────────
paths:

  # ════════════════════════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════════════════════════
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [full_name, email, password, role_name]
              properties:
                full_name:    { type: string,  example: "John Doe" }
                email:        { type: string,  format: email, example: "john@example.com" }
                password:     { type: string,  minLength: 8, example: "securePass123" }
                phone_number: { type: string,  example: "+923001234567" }
                role_name:
                  type: string
                  enum: [Admin, Customer, Vendor, Courier]
                  example: Customer
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "User registered successfully" }
                  user:    { $ref: '#/components/schemas/UserPublic' }
        '400':
          description: Missing fields or password too short
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Email already registered
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email, example: "john@example.com" }
                password: { type: string, example: "securePass123" }
      responses:
        '200':
          description: Login successful — returns signed JWT
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Account blocked or inactive
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the currently authenticated user's profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPublic' }
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ════════════════════════════════════════════════════════════
  # ADMIN
  # ════════════════════════════════════════════════════════════
  /admin/users:
    get:
      tags: [Admin]
      summary: List all users (Admin only)
      responses:
        '200':
          description: Array of all user accounts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/UserPublic' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden — Admin role required }

  /admin/users/{id}/block:
    patch:
      tags: [Admin]
      summary: Block a user account (Admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: User blocked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "User blocked successfully" }
                  user:
                    type: object
                    properties:
                      id:     { type: integer, example: 4 }
                      status: { type: string,  example: "blocked" }
        '404':
          description: User not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /admin/assign-courier:
    post:
      tags: [Admin]
      summary: Assign a courier to an order (Admin only, transactional)
      description: |
        Runs inside a PostgreSQL transaction with `FOR UPDATE` row locks.
        Steps: validate order is `placed` → check no existing assignment →
        verify courier is `available` → create delivery record →
        set courier `busy` → set order `processing` → COMMIT.
        Any failure triggers a full ROLLBACK.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id, courier_id]
              properties:
                order_id:   { type: integer, example: 1 }
                courier_id: { type: integer, example: 2 }
      responses:
        '201':
          description: Courier assigned — order moved to `processing`
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:  { type: string, example: "Courier assigned successfully" }
                  delivery: { $ref: '#/components/schemas/DeliveryRecord' }
        '400':
          description: Order not in `placed` status or courier not `available`
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Order or courier not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: A courier is already assigned to this order
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ════════════════════════════════════════════════════════════
  # CATEGORIES
  # ════════════════════════════════════════════════════════════
  /categories:
    get:
      tags: [Categories]
      summary: List all active categories (public)
      security: []
      responses:
        '200':
          description: Array of active categories with parent name resolved
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Category' }

    post:
      tags: [Categories]
      # FIX: was "Admin/Vendor" — categories are platform-wide taxonomy, Admin only
      summary: Create a category (Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category_name]
              properties:
                category_name: { type: string,  example: "Electronics" }
                parent_cat_id: { type: integer, nullable: true, example: null }
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }
        '404':
          description: Parent category not found or inactive
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /categories/{id}:
    # FIX: was PUT — controller does partial updates → PATCH is correct
    patch:
      tags: [Categories]
      summary: Update a category (Admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category_name: { type: string }
                parent_cat_id: { type: integer, nullable: true }
                status:        { type: string, enum: [active, inactive] }
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }
        '400':
          description: Invalid status value
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Category not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    delete:
      tags: [Categories]
      summary: Soft-delete a category — sets status to inactive (Admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Category deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Category deactivated successfully" }
        '404':
          description: Category not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ════════════════════════════════════════════════════════════
  # PRODUCTS
  # ════════════════════════════════════════════════════════════
  /products:
    get:
      tags: [Products]
      summary: List active products, paginated (public)
      security: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
          description: Page number
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
          description: Results per page (max 100)
      responses:
        '200':
          description: Paginated product list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Product' }
                  pagination:
                    type: object
                    properties:
                      page:        { type: integer, example: 1 }
                      limit:       { type: integer, example: 20 }
                      total:       { type: integer, example: 84 }
                      total_pages: { type: integer, example: 5 }

    post:
      tags: [Products]
      summary: Create a product (Admin or Vendor)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category_id, product_name]
              properties:
                category_id:  { type: integer, example: 1 }
                product_name: { type: string,  example: "Smartphone X" }
                description:  { type: string,  example: "Latest state-of-the-art smartphone." }
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404':
          description: Category not found or inactive
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /products/{id}:
    # FIX: This endpoint was missing from the original swagger entirely
    get:
      tags: [Products]
      summary: Get a single product with all its variants (public)
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Product detail with variants
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductDetail' }
        '404':
          description: Product not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    # FIX: was PUT — controller does partial updates → PATCH is correct
    patch:
      tags: [Products]
      summary: Update a product (Admin or Vendor)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category_id:  { type: integer }
                product_name: { type: string }
                description:  { type: string }
                status:       { type: string, enum: [active, inactive] }
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404':
          description: Product not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    delete:
      tags: [Products]
      summary: Soft-delete a product — sets status to inactive (Admin or Vendor)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Product deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Product deactivated successfully" }
        '404':
          description: Product not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /products/{id}/variants:
    post:
      tags: [Products]
      summary: Add a variant to a product (Admin or Vendor)
      parameters:
        - in: path
          name: id
          required: true
          description: Product ID
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [price]
              properties:
                variant_name:   { type: string,  example: "128GB Black" }
                sku:            { type: string,  example: "SM-X-128-BLK" }
                price:          { type: number,  example: 799.99 }
                stock_quantity: { type: integer, example: 50 }
      responses:
        '201':
          description: Variant created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductVariant' }
        '404':
          description: Product not found or inactive
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: SKU already in use
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # FIX: was /variants/{id} PUT at a separate top-level path (which was unmounted/dead).
  #      Now correctly nested under the product resource. Method changed to PATCH.
  /products/{id}/variants/{variantId}:
    patch:
      tags: [Products]
      summary: Update a product variant (Admin or Vendor)
      parameters:
        - in: path
          name: id
          required: true
          description: Product ID
          schema: { type: integer }
        - in: path
          name: variantId
          required: true
          description: Variant ID
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                variant_name:   { type: string }
                sku:            { type: string }
                price:          { type: number }
                stock_quantity: { type: integer }
      responses:
        '200':
          description: Variant updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductVariant' }
        '404':
          description: Variant not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: SKU already in use
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ════════════════════════════════════════════════════════════
  # CART
  # ════════════════════════════════════════════════════════════
  /cart:
    # FIX: was POST /cart/add — REST convention is POST to the resource root
    post:
      tags: [Cart]
      summary: Add an item to the cart, or increment quantity if already present (Customer only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_variant_id]
              properties:
                product_variant_id: { type: integer, example: 3 }
                quantity:           { type: integer, example: 1, minimum: 1 }
      responses:
        '200':
          description: Item added or quantity updated
        '400':
          description: Quantity exceeds available stock (includes already-in-cart amount)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Product variant not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    get:
      tags: [Cart]
      summary: View current cart with line totals and cart total (Customer only)
      responses:
        '200':
          description: Cart contents
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CartResponse' }

  /cart/item/{id}:
    delete:
      tags: [Cart]
      summary: Remove an item from the cart (Customer only)
      parameters:
        - in: path
          name: id
          required: true
          description: Cart item ID
          schema: { type: integer }
      responses:
        '200':
          description: Item removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Item removed from cart" }
        '404':
          description: Cart item not found or does not belong to this user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ════════════════════════════════════════════════════════════
  # WISHLIST
  # ════════════════════════════════════════════════════════════
  /wishlist:
    post:
      tags: [Wishlist]
      summary: Add a product variant to wishlist (Customer only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_variant_id]
              properties:
                product_variant_id: { type: integer, example: 3 }
      responses:
        '201':
          description: Item added to wishlist
        '404':
          description: Product variant not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Item is already in the wishlist
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    get:
      tags: [Wishlist]
      summary: Get the user's wishlist (Customer only)
      responses:
        '200':
          description: Wishlist items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        wishlist_id:        { type: integer }
                        product_variant_id: { type: integer }
                        product_name:       { type: string }
                        variant_name:       { type: string }
                        price:              { type: number }
                        stock_quantity:     { type: integer }

  /wishlist/{id}:
    delete:
      tags: [Wishlist]
      summary: Remove an item from the wishlist (Customer only)
      parameters:
        - in: path
          name: id
          required: true
          description: Wishlist item ID
          schema: { type: integer }
      responses:
        '200':
          description: Item removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Item removed from wishlist" }
        '404':
          description: Wishlist item not found or does not belong to this user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ════════════════════════════════════════════════════════════
  # ORDERS
  # ════════════════════════════════════════════════════════════
  /orders:
    post:
      tags: [Orders]
      summary: Place an order from cart (Customer only, transactional)
      description: |
        Runs inside a PostgreSQL transaction.
        Steps: load cart → stock pre-check → validate coupon → INSERT Order →
        INSERT Order_items (DB trigger `trg_reduce_stock` deducts stock per row) →
        DELETE Cart_items → COMMIT.
        Any failure (including trigger stock exception) triggers a full ROLLBACK.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_type]
              properties:
                payment_type:
                  type: string
                  enum: [netbanking, upi, cod]
                  example: "upi"
                shipping_amount:
                  type: number
                  example: 5.99
                  default: 0
                # FIX: was `discount_amount` (client-controlled — security risk).
                # Discount is now derived server-side from the coupon code only.
                coupon_code:
                  type: string
                  example: "SUMMER10"
                  description: Optional coupon code. Validated against the Offers table.
      responses:
        '201':
          description: Order placed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:         { type: string, example: "Order created successfully" }
                  order_id:        { type: integer, example: 7 }
                  order_number:    { type: string,  example: "ORD-1716000000000-427" }
                  total_amount:    { type: string,  example: "1599.98" }
                  discount_amount: { type: string,  example: "160.00" }
                  shipping_amount: { type: string,  example: "5.99" }
                  net_amount:      { type: string,  example: "1445.97" }
        '400':
          description: Cart empty, invalid coupon, or invalid payment type
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Insufficient stock — transaction rolled back
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    get:
      tags: [Orders]
      summary: List orders (Admin sees all; Customer sees own)
      responses:
        '200':
          description: Array of orders
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/OrderSummary' }

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get a single order with items and shipping address
      description: Admin can view any order. Customer can only view their own.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Full order detail with line items
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderDetail' }
        '404':
          description: Order not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ════════════════════════════════════════════════════════════
  # OFFERS
  # ════════════════════════════════════════════════════════════
  /offers:
    get:
      tags: [Offers]
      summary: List currently active offers (public)
      security: []
      description: Only offers with `status=active` and within date range are returned.
      responses:
        '200':
          description: Active offers
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Offer' }

    # FIX: was "Admin/Vendor" — platform coupons are Admin only
    post:
      tags: [Offers]
      summary: Create a discount offer (Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [coupon_code, discount_type, discount_value, start_date, end_date]
              properties:
                coupon_code:    { type: string, example: "SUMMER10" }
                discount_type:  { type: string, enum: [fixed, rate], example: "rate" }
                discount_value: { type: number, example: 10.00 }
                start_date:     { type: string, format: date, example: "2026-06-01" }
                end_date:       { type: string, format: date, example: "2026-08-31" }
      responses:
        '201':
          description: Offer created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Offer' }
        '400':
          description: Invalid discount type, value, or date range
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Coupon code already exists
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # FIX: This endpoint was missing from the original swagger entirely
  /offers/validate:
    post:
      tags: [Offers]
      summary: Validate a coupon code and return discount info (any authenticated user)
      description: Used at checkout to check if a coupon is valid before placing an order.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [coupon_code]
              properties:
                coupon_code: { type: string, example: "SUMMER10" }
      responses:
        '200':
          description: Coupon is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean, example: true }
                  offer: { $ref: '#/components/schemas/Offer' }
        '404':
          description: Coupon invalid or expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /offers/{id}:
    # FIX: was "Admin/Vendor" — platform coupons are Admin only
    delete:
      tags: [Offers]
      summary: Soft-delete an offer — sets status to inactive (Admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Offer deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Offer deactivated successfully" }
        '404':
          description: Offer not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ════════════════════════════════════════════════════════════
  # COURIER
  # ════════════════════════════════════════════════════════════
  /courier/orders:
    get:
      tags: [Courier]
      summary: Get deliveries assigned to the logged-in courier (Courier only)
      responses:
        '200':
          description: List of assigned delivery records with order and address info
        '404':
          description: Courier profile not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /courier/orders/{id}/pick:
    patch:
      tags: [Courier]
      summary: Mark a delivery as picked up — order moves to `shipping` (Courier only)
      description: Atomically updates Order_deliveries and Orders inside a transaction.
      parameters:
        - in: path
          name: id
          required: true
          description: Delivery ID (from Order_deliveries table)
          schema: { type: integer }
      responses:
        '200':
          description: Order picked up successfully
        '404':
          description: Delivery not found, not assigned to this courier, or not in `assigned` status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /courier/orders/{id}/deliver:
    patch:
      tags: [Courier]
      summary: Mark a delivery as delivered — triggers order completion (Courier only)
      description: |
        Updates Order_deliveries status to `delivered`.
        DB trigger `trg_order_delivery_status` automatically sets Orders.status to `delivered`.
        Courier status is reset to `available` in the same transaction.
      parameters:
        - in: path
          name: id
          required: true
          description: Delivery ID (from Order_deliveries table)
          schema: { type: integer }
      responses:
        '200':
          description: Order delivered successfully — courier marked available
        '404':
          description: Delivery not found, not assigned to this courier, or not in `picked` status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ════════════════════════════════════════════════════════════
  # REPORTS
  # ════════════════════════════════════════════════════════════
  /reports/customer-orders:
    get:
      tags: [Reports]
      summary: Customer order summary — queries `Customer_Order_Summary` DB view (Admin only)
      responses:
        '200':
          description: Report rows from the view
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    full_name: { type: string }
                    order_id:  { type: integer }
                    net_amount:{ type: number }
                    status:    { type: string }

  /reports/product-sales:
    get:
      tags: [Reports]
      summary: Product sales report — queries `Product_Sales_Report` DB view (Admin only)
      responses:
        '200':
          description: Report rows from the view, ordered by total revenue desc
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    product_name:  { type: string }
                    total_sold:    { type: integer }
                    total_revenue: { type: number }

  /reports/active-deliveries:
    get:
      tags: [Reports]
      summary: Active deliveries — queries `Courier_Active_Deliveries` DB view (Admin only)
      responses:
        '200':
          description: Report rows from the view
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    courier_id: { type: integer }
                    order_id:   { type: integer }
                    status:     { type: string }